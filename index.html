<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FinTrack" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>FinTrack</title>

    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        transition: opacity 0.35s ease;
      }
      #app-loader.is-hidden {
        opacity: 0;
        pointer-events: none;
      }
      #app-loader .app-loader__spinner {
        width: 76px;
        height: 76px;
        transform-origin: center;
        animation: app-loader-spin 0.8s linear infinite;
      }
      #app-loader .app-loader__track {
        fill: none;
        stroke: rgba(255, 255, 255, 0.12);
        stroke-width: 9;
      }
      #app-loader .app-loader__arc {
        fill: none;
        stroke: #41a141;
        stroke-width: 5;
        stroke-linecap: round;
        stroke-dasharray: 40 126;
      }
      @keyframes app-loader-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-loader .app-loader__spinner {
          animation-duration: 1.6s;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-loader" aria-hidden="true">
      <svg class="app-loader__spinner" viewBox="0 0 50 50">
        <circle class="app-loader__track" cx="25" cy="25" r="20" />
        <circle class="app-loader__arc" cx="25" cy="25" r="20" />
      </svg>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
